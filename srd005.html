<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <style>
        /* --- Configuración Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #0B001A, #1F0D3D, #4A154B);
            font-family: 'Arial', sans-serif;
        }

        /* --- Pantalla de Bloqueo (Contraseña) --- */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 0, 26, 0.93);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .lock-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(218, 112, 214, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lock-box h2 {
            color: #FFF;
            margin-bottom: 20px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #BA55D3;
        }

        .lock-box input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #8A2BE2;
            padding: 12px 20px;
            border-radius: 25px;
            color: #FFF;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 200px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
        }

        .lock-box input:focus {
            border-color: #DA70D6;
            box-shadow: 0 0 15px #DA70D6;
            width: 220px;
        }

        .lock-box button {
            display: block;
            margin: 20px auto 0;
            background: linear-gradient(45deg, #8A2BE2, #DA70D6);
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .lock-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #DA70D6;
        }

        .error-msg {
            color: #FF4A4A;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Clase para desvanecer la pantalla de bloqueo */
        .lock-screen.unlock {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* --- Cielo y Estrella Fugaz --- */
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            z-index: 1;
        }

        .shooting-star {
            position: absolute;
            left: 50%;
            top: 10%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 10px #fff, 0 0 20px #A020F0;
            transform: rotate(-35deg);
            animation: shoot 4s linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% {
                transform: rotate(-35deg) translateX(0);
                opacity: 1;
            }
            70% { opacity: 1; }
            100% {
                transform: rotate(-35deg) translateX(-1000px);
                opacity: 0;
            }
        }

        /* --- El Jardín de Flores --- */
        .garden {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, #1a0933, #0a0214);
            z-index: 2;
            box-shadow: 0 -20px 30px rgba(74, 21, 75, 0.5);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-end;
            padding-bottom: 20px;
        }

        .flower {
            position: relative;
            width: 30px;
            height: 30px;
            margin: 15px;
            animation: sway 3s ease-in-out infinite alternate;
        }

        .flower::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 14px;
            width: 2px;
            height: 25px;
            background: #143d14;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background: radial-gradient(circle, #DA70D6, #8A2BE2);
            border-radius: 50% 50% 0 50%;
            width: 14px;
            height: 14px;
            opacity: 0.85;
        }

        .petal-1 { transform: rotate(0deg) translate(6px, 6px); }
        .petal-2 { transform: rotate(72deg) translate(6px, 6px); }
        .petal-3 { transform: rotate(144deg) translate(6px, 6px); }
        .petal-4 { transform: rotate(216deg) translate(6px, 6px); }
        .petal-5 { transform: rotate(288deg) translate(6px, 6px); }

        .center {
            position: absolute;
            top: 9px;
            left: 9px;
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 5px #FFD700;
            z-index: 2;
        }

        @keyframes sway {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        /* --- Mensaje "TE QUIERO <3" --- */
        .message-container {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
            pointer-events: none;
        }

        .message {
            font-size: 3.5rem;
            font-weight: bold;
            color: #FFFFFF;
            text-shadow: 0 0 10px #BA55D3, 0 0 20px #8A2BE2, 0 0 40px #000;
            letter-spacing: 5px;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 15px #EE82EE, 0 0 30px #9400D3, 0 0 50px #8A2BE2; }
        }

        /* --- Botón de Música --- */
        .music-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
            width: 50px;
            height: 50px;
            background: rgba(138, 43, 226, 0.3);
            border: 2px solid #DA70D6;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(218, 112, 214, 0.4);
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: rgba(138, 43, 226, 0.6);
            box-shadow: 0 0 20px #DA70D6;
        }

        .music-btn.playing {
            animation: pulse-btn 1.5s infinite alternate;
            background: #8A2BE2;
        }

        @keyframes pulse-btn {
            0% { box-shadow: 0 0 10px #DA70D6; }
            100% { box-shadow: 0 0 25px #FFF; }
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE BLOQUEO -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-box">
            <h2>Escribe la contraseña secreta</h2>
            <!-- El input acepta cualquier texto, pero JS verificará que sea <3 -->
            <input type="text" id="passwordInput" placeholder="Contraseña..." autocomplete="off">
            <button id="unlockBtn">Entrar</button>
            <div class="error-msg" id="errorMsg">Contraseña incorrecta, intenta de nuevo... 💜</div>
        </div>
    </div>

    <!-- REPRODUCTOR DE MÚSICA -->
    <button class="music-btn" id="musicBtn">💜</button>
    <!-- Reemplaza "tu_cancion.mp3" por tu archivo de música real -->
    <audio id="bgMusic" src="estrella-fugaz.mp3" loop></audio>

    <div class="sky">
        <div class="shooting-star"></div>
    </div>

    <div class="message-container">
        <h1 class="message">TE QUIERO &lt;3</h1>
    </div>

    <div class="garden" id="garden"></div>

    <script>
        // --- Elementos de la pantalla de bloqueo y música ---
        const lockScreen = document.getElementById('lockScreen');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorMsg = document.getElementById('errorMsg');
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        // Función para validar la contraseña
        function checkPassword() {
            const passwordValue = passwordInput.value.trim();
            
            // Si la contraseña es correcta "<3"
            if (passwordValue === "<3") {
                lockScreen.classList.add('unlock'); // Oculta la pantalla con animación
                
                // Intenta reproducir la música de fondo automáticamente al entrar
                bgMusic.play().then(() => {
                    musicBtn.innerText = "🎵";
                    musicBtn.classList.add('playing');
                }).catch(error => {
                    console.log("El navegador bloqueó el autoplay, requiere un click extra en el botón.");
                });
                
                errorMsg.style.display = "none";
            } else {
                // Si está mal, muestra el mensaje de error y reinicia la animación
                errorMsg.style.display = "block";
                errorMsg.style.animation = 'none';
                errorMsg.offsetHeight; /* truco para reiniciar animación CSS */
                errorMsg.style.animation = 'shake 0.3s ease';
                passwordInput.value = "";
            }
        }

        // Eventos para validar (Hacer click en el botón o presionar ENTER)
        unlockBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // --- Control Manual de la Música (Una vez desbloqueado) ---
        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.innerText = "🎵";
                musicBtn.classList.add('playing');
            } else {
                bgMusic.pause();
                musicBtn.innerText = "💜";
                musicBtn.classList.remove('playing');
            }
        });

        // --- Generador Automático de Flores ---
        const garden = document.getElementById('garden');
        const totalFlores = 80;

        for (let i = 0; i < totalFlores; i++) {
            const flower = document.createElement('div');
            flower.classList.add('flower');

            const scale = 0.6 + Math.random() * 0.6;
            const delay = Math.random() * 2;
            flower.style.transform = `scale(${scale})`;
            flower.style.animationDelay = `${delay}s`;

            for (let j = 1; j <= 5; j++) {
                const petal = document.createElement('div');
                petal.classList.add('petal', `petal-${j}`);
                flower.appendChild(petal);
            }

            const center = document.createElement('div');
            center.classList.add('center');
            flower.appendChild(center);

            garden.appendChild(flower);
        }
    </script>
</body>
</html>
